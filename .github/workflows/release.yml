name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Build stable macOS artefacts
        run: npm run dist:mac
        timeout-minutes: 60
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Back up stable update metadata
        if: ${{ !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}
        run: |
          mkdir -p release/stable-yml-backup
          cp release/*.yml release/stable-yml-backup/ || true

      - name: Build beta-channel artefacts for stable release
        if: ${{ !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}
        run: npx electron-builder --config electron-builder.config.cjs --mac --publish=never
        timeout-minutes: 45
        env:
          FORCE_BETA_BUILD: "true"
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Restore stable update metadata
        if: ${{ !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}
        run: |
          cp release/stable-yml-backup/latest*.yml release/ || true
          rm -rf release/stable-yml-backup

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            release/*.zip
            release/latest*.yml
            release/beta*.yml
            release/*.blockmap

      - name: Verify published macOS release artefacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_NAME" == *alpha* || "$GITHUB_REF_NAME" == *beta* || "$GITHUB_REF_NAME" == *rc* ]]; then
            asset_names=("Susura-Beta-macos-arm64.zip")
            app_names=("Susura Beta.app")
          else
            asset_names=("Susura-macos-arm64.zip" "Susura-Beta-macos-arm64.zip")
            app_names=("Susura.app" "Susura Beta.app")
          fi

          rm -rf verified-release
          mkdir -p verified-release

          for index in "${!asset_names[@]}"; do
            asset_name="${asset_names[$index]}"
            app_name="${app_names[$index]}"
            app_dir="verified-release/${asset_name%.zip}"

            mkdir -p "$app_dir"

            for attempt in 1 2 3 4 5; do
              if gh release download "$GITHUB_REF_NAME" --pattern "$asset_name" --dir "$app_dir"; then
                break
              fi

              if [ "$attempt" -eq 5 ]; then
                echo "Unable to download published release asset: $asset_name"
                exit 1
              fi

              sleep 6
            done

            unzip -q "$app_dir/$asset_name" -d "$app_dir"
            codesign --verify --deep --strict --verbose=2 "$app_dir/$app_name"
            spctl -a -vv "$app_dir/$app_name"
          done
