name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: "1.88"

jobs:
  build-macos:
    name: Build macOS ARM64
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Build macOS artefacts
        run: |
          set -euo pipefail

          npm run dist:mac

          if [[ "$GITHUB_REF_NAME" != *alpha* && "$GITHUB_REF_NAME" != *beta* && "$GITHUB_REF_NAME" != *rc* ]]; then
            mkdir -p release/stable-yml-backup
            cp release/*.yml release/stable-yml-backup/ || true
            FORCE_BETA_BUILD=true npx electron-builder --config electron-builder.config.cjs --mac --publish=never
            cp release/stable-yml-backup/latest*.yml release/ || true
            rm -rf release/stable-yml-backup
          fi
        timeout-minutes: 75
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Verify macOS app signatures
        run: |
          set -euo pipefail

          rm -rf verified-release
          mkdir -p verified-release

          shopt -s nullglob
          for zip_path in release/Susura*-macos-arm64.zip; do
            app_dir="verified-release/$(basename "${zip_path%.zip}")"
            mkdir -p "$app_dir"
            unzip -q "$zip_path" -d "$app_dir"

            app_path="$(find "$app_dir" -maxdepth 1 -name '*.app' -type d | head -n 1)"
            test -n "$app_path"
            codesign --verify --deep --strict --verbose=2 "$app_path"
            spctl -a -vv "$app_path"
          done

      - name: Upload macOS artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: |
            release/*.zip
            release/latest*.yml
            release/beta*.yml
            release/*.blockmap
          if-no-files-found: error

  build-windows:
    name: Build Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: windows-11-arm
          - arch: x64
            runner: windows-2025
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Build Windows artefacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          npm run dist:win:${{ matrix.arch }}

          if (-not ($env:GITHUB_REF_NAME.Contains("alpha") -or $env:GITHUB_REF_NAME.Contains("beta") -or $env:GITHUB_REF_NAME.Contains("rc"))) {
            $env:FORCE_BETA_BUILD = "true"
            $env:SUSURA_PACKAGE_PLATFORM = "win"
            $env:SUSURA_PACKAGE_ARCH = "${{ matrix.arch }}"
            if ("${{ matrix.arch }}" -eq "arm64") {
              $env:USE_SYSTEM_7ZA = "true"
              node scripts/prepare-windows-7za.mjs
            }
            npx electron-builder --config electron-builder.config.cjs --win nsis --${{ matrix.arch }} --publish=never
          }
        timeout-minutes: 75

      - name: Upload Windows artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ matrix.arch }}
          path: |
            release/*windows-${{ matrix.arch }}-setup.exe
            release/*windows-${{ matrix.arch }}-setup.exe.blockmap
          if-no-files-found: error

  build-linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x64
            runner: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Build Linux artefacts
        run: |
          set -euo pipefail

          npm run dist:linux:${{ matrix.arch }}

          if [[ "$GITHUB_REF_NAME" != *alpha* && "$GITHUB_REF_NAME" != *beta* && "$GITHUB_REF_NAME" != *rc* ]]; then
            FORCE_BETA_BUILD=true SUSURA_PACKAGE_PLATFORM=linux SUSURA_PACKAGE_ARCH=${{ matrix.arch }} npx electron-builder --config electron-builder.config.cjs --linux AppImage rpm --${{ matrix.arch }} --publish=never
            FORCE_BETA_BUILD=true node scripts/build-linux-deb.mjs ${{ matrix.arch }}
          fi
        timeout-minutes: 75

      - name: Upload Linux artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: |
            release/*-${{ matrix.arch }}.AppImage
            release/*-${{ matrix.arch }}.deb
            release/*-${{ matrix.arch }}.rpm
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs:
      - build-macos
      - build-windows
      - build-linux
    runs-on: ubuntu-24.04
    steps:
      - name: Download release artefacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release artefacts
        run: find release -maxdepth 1 -type f -print | sort

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: release/*

  update-homebrew:
    name: Update Homebrew (Stable)
    needs: publish-release
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc')
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and calculate hashes
        id: hashes
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.VERSION }}"
          BASE_URL="https://github.com/apotenza92/susura/releases/download/v${VERSION}"

          curl -fL "${BASE_URL}/Susura-macos-arm64.zip" -o stable.zip
          STABLE_SHA256="$(shasum -a 256 stable.zip | cut -d' ' -f1)"
          echo "STABLE_SHA256=${STABLE_SHA256}" >> "$GITHUB_OUTPUT"

          curl -fL "${BASE_URL}/Susura-Beta-macos-arm64.zip" -o beta.zip
          BETA_SHA256="$(shasum -a 256 beta.zip | cut -d' ' -f1)"
          echo "BETA_SHA256=${BETA_SHA256}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew casks
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.VERSION }}"
          STABLE_SHA256="${{ steps.hashes.outputs.STABLE_SHA256 }}"
          BETA_SHA256="${{ steps.hashes.outputs.BETA_SHA256 }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/apotenza92/homebrew-tap.git"
          cd homebrew-tap

          cat > Casks/susura.rb << EOF
          cask "susura" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/apotenza92/susura/releases/download/v#{version}/Susura-macos-arm64.zip"
              sha256 "${STABLE_SHA256}"
            end

            name "Susura"
            desc "Private desktop assistant for live calls and screen work"
            homepage "https://github.com/apotenza92/susura"

            livecheck do
              url :url
              strategy :github_latest
            end

            app "Susura.app"

            zap trash: [
              "~/Library/Application Support/Susura",
              "~/Library/Caches/dev.susura.app",
              "~/Library/Caches/dev.susura.app.ShipIt",
              "~/Library/Preferences/dev.susura.app.plist",
              "~/Library/Saved Application State/dev.susura.app.savedState",
            ]
          end
          EOF

          cat > 'Casks/susura@beta.rb' << EOF
          cask "susura@beta" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/apotenza92/susura/releases/download/v#{version}/Susura-Beta-macos-arm64.zip"
              sha256 "${BETA_SHA256}"
            end

            name "Susura Beta"
            desc "Beta channel for Susura"
            homepage "https://github.com/apotenza92/susura"

            livecheck do
              url "https://api.github.com/repos/apotenza92/susura/releases"
              strategy :json do |json|
                json
                  .reject { |release| release["draft"] }
                  .map { |release| release["tag_name"] }
              end
            end

            app "Susura Beta.app"

            zap trash: [
              "~/Library/Application Support/Susura Beta",
              "~/Library/Caches/dev.susura.app.beta",
              "~/Library/Caches/dev.susura.app.beta.ShipIt",
              "~/Library/Preferences/dev.susura.app.beta.plist",
              "~/Library/Saved Application State/dev.susura.app.beta.savedState",
            ]
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/susura.rb 'Casks/susura@beta.rb'

          if git diff --cached --quiet; then
            echo "Homebrew casks are already up to date."
            exit 0
          fi

          git commit -m "Update susura to v${VERSION} (stable + beta casks)"
          git push

  update-homebrew-beta:
    name: Update Homebrew (Beta)
    needs: publish-release
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v') && (contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc'))
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and calculate hash
        id: hashes
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.VERSION }}"
          curl -fL "https://github.com/apotenza92/susura/releases/download/v${VERSION}/Susura-Beta-macos-arm64.zip" -o beta.zip
          BETA_SHA256="$(shasum -a 256 beta.zip | cut -d' ' -f1)"
          echo "BETA_SHA256=${BETA_SHA256}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew beta cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.VERSION }}"
          BETA_SHA256="${{ steps.hashes.outputs.BETA_SHA256 }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/apotenza92/homebrew-tap.git"
          cd homebrew-tap

          cat > 'Casks/susura@beta.rb' << EOF
          cask "susura@beta" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/apotenza92/susura/releases/download/v#{version}/Susura-Beta-macos-arm64.zip"
              sha256 "${BETA_SHA256}"
            end

            name "Susura Beta"
            desc "Beta channel for Susura"
            homepage "https://github.com/apotenza92/susura"

            livecheck do
              url "https://api.github.com/repos/apotenza92/susura/releases"
              strategy :json do |json|
                json
                  .reject { |release| release["draft"] }
                  .map { |release| release["tag_name"] }
              end
            end

            app "Susura Beta.app"

            zap trash: [
              "~/Library/Application Support/Susura Beta",
              "~/Library/Caches/dev.susura.app.beta",
              "~/Library/Caches/dev.susura.app.beta.ShipIt",
              "~/Library/Preferences/dev.susura.app.beta.plist",
              "~/Library/Saved Application State/dev.susura.app.beta.savedState",
            ]
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'Casks/susura@beta.rb'

          if git diff --cached --quiet; then
            echo "Homebrew beta cask is already up to date."
            exit 0
          fi

          git commit -m "Update susura@beta to v${VERSION}"
          git push
