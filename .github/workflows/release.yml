name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Build stable macOS artefacts
        run: npm run dist:mac
        timeout-minutes: 60
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Back up stable update metadata
        if: ${{ !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}
        run: |
          mkdir -p release/stable-yml-backup
          cp release/*.yml release/stable-yml-backup/ || true

      - name: Build beta-channel artefacts for stable release
        if: ${{ !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}
        run: npx electron-builder --config electron-builder.config.cjs --mac --publish=never
        timeout-minutes: 45
        env:
          FORCE_BETA_BUILD: "true"
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Restore stable update metadata
        if: ${{ !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}
        run: |
          cp release/stable-yml-backup/latest*.yml release/ || true
          rm -rf release/stable-yml-backup

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            release/*.zip
            release/latest*.yml
            release/beta*.yml
            release/*.blockmap

      - name: Verify published macOS release artefacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_NAME" == *alpha* || "$GITHUB_REF_NAME" == *beta* || "$GITHUB_REF_NAME" == *rc* ]]; then
            asset_names=("Susura-Beta-macos-arm64.zip")
            app_names=("Susura Beta.app")
          else
            asset_names=("Susura-macos-arm64.zip" "Susura-Beta-macos-arm64.zip")
            app_names=("Susura.app" "Susura Beta.app")
          fi

          rm -rf verified-release
          mkdir -p verified-release

          for index in "${!asset_names[@]}"; do
            asset_name="${asset_names[$index]}"
            app_name="${app_names[$index]}"
            app_dir="verified-release/${asset_name%.zip}"

            mkdir -p "$app_dir"

            for attempt in 1 2 3 4 5; do
              if gh release download "$GITHUB_REF_NAME" --pattern "$asset_name" --dir "$app_dir"; then
                break
              fi

              if [ "$attempt" -eq 5 ]; then
                echo "Unable to download published release asset: $asset_name"
                exit 1
              fi

              sleep 6
            done

            unzip -q "$app_dir/$asset_name" -d "$app_dir"
            codesign --verify --deep --strict --verbose=2 "$app_dir/$app_name"
            spctl -a -vv "$app_dir/$app_name"
          done

  update-homebrew:
    name: Update Homebrew (Stable)
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc')
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and calculate hashes
        id: hashes
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.VERSION }}"
          BASE_URL="https://github.com/apotenza92/susura/releases/download/v${VERSION}"

          curl -fL "${BASE_URL}/Susura-macos-arm64.zip" -o stable.zip
          STABLE_SHA256="$(shasum -a 256 stable.zip | cut -d' ' -f1)"
          echo "STABLE_SHA256=${STABLE_SHA256}" >> "$GITHUB_OUTPUT"

          curl -fL "${BASE_URL}/Susura-Beta-macos-arm64.zip" -o beta.zip
          BETA_SHA256="$(shasum -a 256 beta.zip | cut -d' ' -f1)"
          echo "BETA_SHA256=${BETA_SHA256}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew casks
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.VERSION }}"
          STABLE_SHA256="${{ steps.hashes.outputs.STABLE_SHA256 }}"
          BETA_SHA256="${{ steps.hashes.outputs.BETA_SHA256 }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/apotenza92/homebrew-tap.git"
          cd homebrew-tap

          cat > Casks/susura.rb << EOF
          cask "susura" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/apotenza92/susura/releases/download/v#{version}/Susura-macos-arm64.zip"
              sha256 "${STABLE_SHA256}"
            end

            name "Susura"
            desc "Private desktop assistant for live calls and screen work"
            homepage "https://github.com/apotenza92/susura"

            livecheck do
              url :url
              strategy :github_latest
            end

            app "Susura.app"

            zap trash: [
              "~/Library/Application Support/Susura",
              "~/Library/Caches/dev.susura.app",
              "~/Library/Caches/dev.susura.app.ShipIt",
              "~/Library/Preferences/dev.susura.app.plist",
              "~/Library/Saved Application State/dev.susura.app.savedState",
            ]
          end
          EOF

          cat > 'Casks/susura@beta.rb' << EOF
          cask "susura@beta" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/apotenza92/susura/releases/download/v#{version}/Susura-Beta-macos-arm64.zip"
              sha256 "${BETA_SHA256}"
            end

            name "Susura Beta"
            desc "Beta channel for Susura"
            homepage "https://github.com/apotenza92/susura"

            livecheck do
              url "https://api.github.com/repos/apotenza92/susura/releases"
              strategy :json do |json|
                json
                  .reject { |release| release["draft"] }
                  .map { |release| release["tag_name"] }
              end
            end

            app "Susura Beta.app"

            zap trash: [
              "~/Library/Application Support/Susura Beta",
              "~/Library/Caches/dev.susura.app.beta",
              "~/Library/Caches/dev.susura.app.beta.ShipIt",
              "~/Library/Preferences/dev.susura.app.beta.plist",
              "~/Library/Saved Application State/dev.susura.app.beta.savedState",
            ]
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/susura.rb 'Casks/susura@beta.rb'

          if git diff --cached --quiet; then
            echo "Homebrew casks are already up to date."
            exit 0
          fi

          git commit -m "Update susura to v${VERSION} (stable + beta casks)"
          git push

  update-homebrew-beta:
    name: Update Homebrew (Beta)
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && (contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc'))
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and calculate hash
        id: hashes
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.VERSION }}"
          curl -fL "https://github.com/apotenza92/susura/releases/download/v${VERSION}/Susura-Beta-macos-arm64.zip" -o beta.zip
          BETA_SHA256="$(shasum -a 256 beta.zip | cut -d' ' -f1)"
          echo "BETA_SHA256=${BETA_SHA256}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew beta cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.VERSION }}"
          BETA_SHA256="${{ steps.hashes.outputs.BETA_SHA256 }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/apotenza92/homebrew-tap.git"
          cd homebrew-tap

          cat > 'Casks/susura@beta.rb' << EOF
          cask "susura@beta" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/apotenza92/susura/releases/download/v#{version}/Susura-Beta-macos-arm64.zip"
              sha256 "${BETA_SHA256}"
            end

            name "Susura Beta"
            desc "Beta channel for Susura"
            homepage "https://github.com/apotenza92/susura"

            livecheck do
              url "https://api.github.com/repos/apotenza92/susura/releases"
              strategy :json do |json|
                json
                  .reject { |release| release["draft"] }
                  .map { |release| release["tag_name"] }
              end
            end

            app "Susura Beta.app"

            zap trash: [
              "~/Library/Application Support/Susura Beta",
              "~/Library/Caches/dev.susura.app.beta",
              "~/Library/Caches/dev.susura.app.beta.ShipIt",
              "~/Library/Preferences/dev.susura.app.beta.plist",
              "~/Library/Saved Application State/dev.susura.app.beta.savedState",
            ]
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'Casks/susura@beta.rb'

          if git diff --cached --quiet; then
            echo "Homebrew beta cask is already up to date."
            exit 0
          fi

          git commit -m "Update susura@beta to v${VERSION}"
          git push
