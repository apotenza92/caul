name: Publish Download Page

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "assets/icons/icon-rounded.png"
      - "assets/icons/beta/icon-rounded.png"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: download-page
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Susura
        uses: actions/checkout@v5

      - name: Prepare public site artefact
        run: |
          mkdir -p _site/assets/icons/beta
          cp docs/index.html _site/index.html
          cp docs/.nojekyll _site/.nojekyll
          cp assets/icons/icon-rounded.png _site/assets/icons/icon-rounded.png
          cp assets/icons/beta/icon-rounded.png _site/assets/icons/beta/icon-rounded.png

      - name: Checkout public Pages repository
        uses: actions/checkout@v5
        with:
          repository: apotenza92/apotenza92.github.io
          path: pages-repo
          ssh-key: ${{ secrets.PAGES_DEPLOY_KEY }}

      - name: Publish Susura page
        run: |
          rm -rf pages-repo/susura
          mkdir -p pages-repo/susura
          cp -R _site/. pages-repo/susura/
          touch pages-repo/.nojekyll
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nojekyll susura
          if git diff --cached --quiet; then
            echo "No download page changes to publish."
            exit 0
          fi
          git commit -m "Publish Susura download page"
          git push
