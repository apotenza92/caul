name: Deploy Download Page

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "assets/icons/icon-rounded.png"
      - "assets/icons/beta/icon-rounded.png"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare public site artefact
        run: |
          mkdir -p _site/assets/icons/beta
          cp docs/index.html _site/index.html
          cp docs/.nojekyll _site/.nojekyll
          cp assets/icons/icon-rounded.png _site/assets/icons/icon-rounded.png
          cp assets/icons/beta/icon-rounded.png _site/assets/icons/beta/icon-rounded.png

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
